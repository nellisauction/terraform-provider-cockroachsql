name: test

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2204

    strategy:
      matrix:
        crdbversion: [latest-v26.1, latest-v25.4, latest-v25.3, latest-v25.2, latest-v25.1, latest-v24.3, latest-v24.2, latest-v24.1, latest-v23.2]

    env:
      CRDBVERSION: ${{ matrix.crdbversion }}
      PGPORT: 26257

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.8'

      - name: test
        run: make test

      - name: vet
        run: make vet

      - name: testacc
        run: make testacc
