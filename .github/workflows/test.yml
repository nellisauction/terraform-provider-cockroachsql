name: test

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2204

    strategy:
      matrix:
        crdbversion: [latest-v26.1, latest-v25.4, latest-v25.3, latest-v25.2, latest-v25.1, latest-v24.3, latest-v24.2, latest-v24.1, latest-v23.2]

    services:
      cockroachdb:
        image: cockroachdb/cockroach:${{ matrix.crdbversion }}
        ports:
          - 26257:26257
        options: >-
          --health-cmd "cockroach node status --insecure"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TF_ACC: "true"
      COCKROACH_HOST: localhost
      COCKROACH_PORT: "26257"
      COCKROACH_USER: root
      COCKROACH_DATABASE: tf_tests
      COCKROACH_INSECURE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.8'

      - name: Create test database
        run: |
          docker exec $(docker ps -q --filter ancestor=cockroachdb/cockroach:${{ matrix.crdbversion }}) \
            ./cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS tf_tests;"

      - name: test
        run: make test

      - name: vet
        run: make vet

      - name: testacc
        run: go test -v ./cockroachsql -timeout 120m
