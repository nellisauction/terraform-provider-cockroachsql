name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-devcontainer:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker builder (Blacksmith layer cache)
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build dev container image
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: echo "Dev container image built and cached"

  test:
    needs: build-devcontainer
    runs-on: blacksmith-4vcpu-ubuntu-2204
    strategy:
      matrix:
        crdbversion:
          - latest-v26.1
          - latest-v25.4
          - latest-v25.3
          - latest-v25.2
          - latest-v25.1
          - latest-v24.3
          - latest-v24.2
          - latest-v24.1
          - latest-v23.2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker builder (Blacksmith layer cache)
        uses: useblacksmith/setup-docker-builder@v1

      - name: Run tests in dev container
        uses: devcontainers/ci@v0.3
        env:
          CRDBVERSION: ${{ matrix.crdbversion }}
        with:
          push: never
          runCmd: |
            make test
            make vet
            make testacc
